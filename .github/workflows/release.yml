name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: squid-x86_64-pc-windows-msvc.zip
            binary_name: squid.exe
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: squid-x86_64-unknown-linux-gnu.tar.gz
            binary_name: squid
          - name: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            archive_name: squid-x86_64-apple-darwin.tar.gz
            binary_name: squid
          - name: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
            archive_name: squid-aarch64-apple-darwin.tar.gz
            binary_name: squid

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = Join-Path $pwd 'dist'
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" $staging
          Copy-Item README.md $staging
          Compress-Archive -Path "$staging/*" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Package archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" dist/
          cp README.md dist/
          tar -czf "${{ matrix.archive_name }}" -C dist .

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive_name }}

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
